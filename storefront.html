<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loja Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f8f9fa;
      color: #333;
    }

    header {
      background: white;
      padding: 1rem 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #logoImg {
      height: 50px;
      border-radius: 8px;
    }

    .cart-btn {
      position: relative;
      background: #ff6b35;
      color: white;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .badge {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #e91e63;
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    /* BANNER FIXO */
    #bannerCarousel {
      width: 100%;
      height: 400px;
      background: #f0f0f0;
      position: relative;
      overflow: hidden;
    }

    .banner-img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .banner-img.active {
      opacity: 1;
    }

    .banner-dots {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 1rem;
      background: white;
    }

    .banner-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #ddd;
      border: none;
      cursor: pointer;
    }

    .banner-dot.active {
      background: #ff6b35;
    }

    .hero {
      background: linear-gradient(135deg, #ff6b35, #d84315);
      color: white;
      padding: 3rem 2rem;
      text-align: center;
    }

    .hero h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .search-bar {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 2rem;
      display: flex;
      gap: 1rem;
    }

    .search-bar input,
    .search-bar select {
      flex: 1;
      padding: 0.8rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
    }

    .products-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 2rem;
    }

    .product-card {
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
    }

    .img-container {
      position: relative;
      background: #f5f5f5;
      height: 150px;
      overflow: hidden;
    }

    .product-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .discount-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #e53935;
      color: white;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .product-info {
      padding: 1rem;
    }

    .product-name {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .product-price {
      font-family: 'Poppins', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #ff6b35;
      margin-bottom: 1rem;
    }

    .add-btn {
      width: 100%;
      padding: 0.8rem;
      background: #ff6b35;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #999;
    }

    @media (max-width: 768px) {
      .hero h1 {
        font-size: 1.8rem;
      }

      #bannerCarousel {
        height: 250px;
      }

      .products-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <img id="logoImg" src="" alt="Logo" style="display: none;">
  <button class="cart-btn" onclick="toggleCart()">
    🛒 Carrinho
    <span class="badge" id="cartBadge" style="display:none;">0</span>
  </button>
</header>

<!-- BANNER FIXO -->
<div id="bannerCarousel">
  <img class="banner-img active" id="bannerImg1" src="" alt="Banner 1">
  <img class="banner-img" id="bannerImg2" src="" alt="Banner 2">
  <img class="banner-img" id="bannerImg3" src="" alt="Banner 3">
  
  <div class="banner-dots">
    <button class="banner-dot active" onclick="goToBanner(0)"></button>
    <button class="banner-dot" onclick="goToBanner(1)"></button>
    <button class="banner-dot" onclick="goToBanner(2)"></button>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1 id="storeTitle">Bem-vindo à nossa loja!</h1>
  <p id="storeDesc">Produtos de qualidade</p>
</div>

<!-- BUSCA -->
<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Buscar..." onkeyup="filterProducts()">
  <select id="categoryFilter" onchange="filterProducts()">
    <option value="">Todas as categorias</option>
  </select>
</div>

<!-- PRODUTOS -->
<div class="products-container">
  <div id="productsContainer" class="products-grid">
    <div class="empty-state">Carregando...</div>
  </div>
</div>

<script>
  // ===== CONFIG =====
  const firebaseConfig = {
    apiKey: "AIzaSyDaZWj9ApORih26Pb4x-46ilrtxEXxQfm0",
    authDomain: "mercado-hub-90a82.firebaseapp.com",
    projectId: "mercado-hub-90a82",
    storageBucket: "mercado-hub-90a82.firebasestorage.app",
    messagingSenderId: "872416491456",
    appId: "1:872416491456:web:29c37a42cfeeb40a087a25"
  };

  const app = firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let produtos = [];
  let lojaId = null;
  let storeData = null;
  let currentBannerIndex = 0;
  let bannerAutoplayInterval = null;

  // ===== INIT =====
  async function init() {
    console.log('🚀 Iniciando...');
    
    // 1. Pegar lojaId
    const params = new URLSearchParams(window.location.search);
    lojaId = params.get('loja') || params.get('lojaId');
    console.log('1️⃣ lojaId:', lojaId);

    // 2. Se não tiver, tentar extrair da URL
    if (!lojaId) {
      const match = window.location.pathname.match(/\/loja\/([^/]+)/);
      if (match) {
        const slugOuId = match[1];
        console.log('2️⃣ Tentando slug:', slugOuId);
        
        try {
          const q = await db.collection('lojas').where('slug', '==', slugOuId).get();
          if (!q.empty) {
            lojaId = q.docs[0].id;
            console.log('✅ Slug encontrado');
          } else {
            lojaId = slugOuId;
          }
        } catch (e) {
          lojaId = slugOuId;
        }
      }
    }

    if (!lojaId) {
      console.error('❌ Sem lojaId');
      document.getElementById('productsContainer').innerHTML = '<div class="empty-state"><h2>Loja não encontrada</h2></div>';
      return;
    }

    // 3. Carregar loja
    try {
      console.log('3️⃣ Buscando loja:', lojaId);
      const lojaDoc = await db.collection('lojas').doc(lojaId).get();
      
      if (!lojaDoc.exists) {
        throw new Error('Loja não existe');
      }

      storeData = lojaDoc.data();
      console.log('4️⃣ Loja carregada:', storeData.nome);

      // 4. Atualizar UI da loja
      document.getElementById('storeTitle').textContent = storeData.nome || 'Loja';
      document.getElementById('storeDesc').textContent = storeData.descricao || 'Bem-vindo!';
      document.title = storeData.nome;

      // 5. Logo
      if (storeData.logo) {
        const logoImg = document.getElementById('logoImg');
        logoImg.src = storeData.logo;
        logoImg.style.display = 'block';
        console.log('✅ Logo carregada');
      }

      // 6. Banners
      if (storeData.banner1) {
        document.getElementById('bannerImg1').src = storeData.banner1;
        document.getElementById('bannerImg2').src = storeData.banner2 || storeData.banner1;
        document.getElementById('bannerImg3').src = storeData.banner3 || storeData.banner1;
        mostrarBanner(0);
        iniciarAutoplay();
        console.log('✅ Banners carregados');
      }

      // 7. Produtos
      console.log('5️⃣ Buscando produtos...');
      const prodsSnap = await db.collection('produtos').where('loja_id', '==', lojaId).get();
      
      console.log('6️⃣ Produtos encontrados:', prodsSnap.size);

      produtos = [];
      prodsSnap.forEach(doc => {
        produtos.push({ id: doc.id, ...doc.data() });
      });

      console.log('📦 Produtos:', produtos);

      renderProducts(produtos);
      populateCategories();

      console.log('✅ Tudo carregado!');

    } catch (error) {
      console.error('❌ ERRO:', error);
      document.getElementById('productsContainer').innerHTML = `<div class="empty-state"><h2>Erro: ${error.message}</h2></div>`;
    }
  }

  // ===== BANNER =====
  function mostrarBanner(index) {
    currentBannerIndex = index;
    
    document.querySelectorAll('.banner-img').forEach(img => img.classList.remove('active'));
    document.querySelectorAll('.banner-dot').forEach(dot => dot.classList.remove('active'));
    
    const imgs = document.querySelectorAll('.banner-img');
    if (imgs[index]) imgs[index].classList.add('active');
    
    const dots = document.querySelectorAll('.banner-dot');
    if (dots[index]) dots[index].classList.add('active');
  }

  function goToBanner(index) {
    mostrarBanner(index);
    if (bannerAutoplayInterval) clearInterval(bannerAutoplayInterval);
    iniciarAutoplay();
  }

  function iniciarAutoplay() {
    bannerAutoplayInterval = setInterval(() => {
      mostrarBanner((currentBannerIndex + 1) % 3);
    }, 5000);
  }

  // ===== PRODUTOS =====
  function populateCategories() {
    const cats = [...new Set(produtos.map(p => p.categoria).filter(c => c))];
    const select = document.getElementById('categoryFilter');
    cats.forEach(cat => {
      const opt = document.createElement('option');
      opt.value = cat;
      opt.textContent = cat;
      select.appendChild(opt);
    });
  }

  function renderProducts(lista) {
    const container = document.getElementById('productsContainer');
    
    if (lista.length === 0) {
      container.innerHTML = '<div class="empty-state" style="grid-column: 1 / -1;"><h2>Nenhum produto</h2></div>';
      return;
    }

    container.innerHTML = lista.map(p => {
      const preco = Number(p.preco) || 0;
      const promo = Number(p.promocao) || 0;
      const desc = promo > 0 ? Math.round((1 - promo/preco) * 100) : 0;

      return `
        <div class="product-card">
          <div class="img-container">
            ${desc > 0 ? `<span class="discount-badge">-${desc}%</span>` : ''}
            <img src="${p.imagem || 'https://via.placeholder.com/200'}" class="product-img" onerror="this.src='https://via.placeholder.com/200'">
          </div>
          <div class="product-info">
            <div class="product-name">${p.nome}</div>
            <div class="product-price">R$ ${(promo > 0 ? promo : preco).toFixed(2)}</div>
            <button class="add-btn" onclick="alert('🛒 Produto adicionado!')">🛒 Adicionar</button>
          </div>
        </div>
      `;
    }).join('');
  }

  function filterProducts() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const cat = document.getElementById('categoryFilter').value;

    const filtered = produtos.filter(p => {
      const matchSearch = p.nome.toLowerCase().includes(search);
      const matchCat = !cat || p.categoria === cat;
      return matchSearch && matchCat;
    });

    renderProducts(filtered);
  }

  function toggleCart() {
    alert('🛒 Carrinho em desenvolvimento!');
  }

  // INICIAR
  window.addEventListener('load', init);
  init();

  console.log('✅ Script pronto');
</script>
</body>
</html>
