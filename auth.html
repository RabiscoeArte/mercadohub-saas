<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Conta - MercadoHub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #ff6b35 0%, #004e89 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .container {
      width: 100%;
      max-width: 450px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      background: linear-gradient(135deg, #ff6b35, #d84315);
      color: white;
      padding: 2rem;
      text-align: center;
    }

    .header h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }

    .header p {
      opacity: 0.9;
      font-size: 0.95rem;
    }

    .form-container {
      padding: 2rem;
    }

    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid #f0f0f0;
    }

    .tab-btn {
      flex: 1;
      padding: 0.8rem;
      background: transparent;
      border: none;
      font-weight: 600;
      color: #999;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
      font-size: 0.95rem;
    }

    .tab-btn.active {
      color: #ff6b35;
      border-bottom-color: #ff6b35;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: #333;
      font-size: 0.9rem;
    }

    input, select {
      width: 100%;
      padding: 0.9rem;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.3s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #ff6b35;
      box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
    }

    .password-toggle {
      position: relative;
    }

    .toggle-btn {
      position: absolute;
      right: 12px;
      top: 38px;
      background: none;
      border: none;
      cursor: pointer;
      color: #999;
      font-size: 1.1rem;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .checkbox-group input {
      width: auto;
    }

    .checkbox-group label {
      margin: 0;
      font-size: 0.9rem;
    }

    .checkbox-group a {
      color: #ff6b35;
      text-decoration: none;
    }

    .btn-submit {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #ff6b35, #d84315);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 0.5rem;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(255, 107, 53, 0.3);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-google {
      width: 100%;
      padding: 0.9rem;
      background: white;
      color: #333;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      margin-bottom: 1rem;
    }

    .btn-google:hover {
      background: #f8f9fa;
      border-color: #ff6b35;
    }

    .divider {
      text-align: center;
      margin: 1.5rem 0;
      color: #999;
      font-size: 0.9rem;
    }

    .divider::before {
      content: '';
      display: block;
      height: 1px;
      background: #e0e0e0;
      margin-bottom: 0.8rem;
    }

    .divider::after {
      content: 'OU';
      position: relative;
      top: -24px;
      background: white;
      padding: 0 0.5rem;
    }

    .alert {
      padding: 0.9rem;
      border-radius: 10px;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .alert.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .login-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: #666;
    }

    .login-link a {
      color: #ff6b35;
      text-decoration: none;
      font-weight: 600;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .loading {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .loading.show {
      display: flex;
    }

    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top: 4px solid white;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .plan-selector {
      background: #f8f9fa;
      padding: 1rem;
      border-radius: 10px;
      margin-bottom: 1rem;
    }

    .plan-selector h4 {
      margin-bottom: 0.8rem;
      font-size: 0.95rem;
      color: #333;
    }

    .plan-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }

    .plan-option {
      position: relative;
    }

    .plan-option input {
      position: absolute;
      opacity: 0;
    }

    .plan-label {
      display: block;
      padding: 0.8rem;
      background: white;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      transition: all 0.3s;
      font-weight: 500;
      font-size: 0.85rem;
    }

    .plan-option input:checked + .plan-label {
      border-color: #ff6b35;
      background: #fff0e9;
      color: #ff6b35;
    }

    @media (max-width: 480px) {
      .container {
        max-width: 100%;
        border-radius: 15px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 1.4rem;
      }

      .form-container {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🏪 MercadoHub</h1>
    <p>Crie sua loja em 2 minutos</p>
  </div>

  <div class="form-container">
    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('register')">Registrar</button>
      <button class="tab-btn" onclick="switchTab('login')">Entrar</button>
    </div>

    <!-- ALERT -->
    <div id="alert" class="alert"></div>

    <!-- FORM REGISTRO -->
    <form id="registerForm" style="display: block;">
      <h3 style="font-size: 1rem; margin-bottom: 1.5rem; color: #333;">Plano</h3>
      
      <div class="plan-selector">
        <div class="plan-options">
          <div class="plan-option">
            <input type="radio" name="plano" id="plan-starter" value="starter" checked>
            <label for="plan-starter" class="plan-label">
              🌱 Starter<br>
              <small style="font-size: 0.75rem; opacity: 0.7;">R$ 99/mês</small>
            </label>
          </div>
          <div class="plan-option">
            <input type="radio" name="plano" id="plan-pro" value="pro">
            <label for="plan-pro" class="plan-label">
              ⭐ Pro<br>
              <small style="font-size: 0.75rem; opacity: 0.7;">R$ 199/mês</small>
            </label>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" name="nome" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <div class="password-toggle">
          <input type="password" id="senha" name="senha" required>
          <button type="button" class="toggle-btn" onclick="togglePassword('senha')">👁️</button>
        </div>
      </div>

      <div class="form-group">
        <label for="nomeLojaRegister">Nome da Loja</label>
        <input type="text" id="nomeLojaRegister" name="nomeLojaRegister" placeholder="Ex: Meu Mercado" required>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="termos" required>
        <label for="termos">Concordo com os <a href="#">Termos de Serviço</a></label>
      </div>

      <button type="submit" class="btn-submit">Criar Conta</button>

      <p class="login-link">Já tem conta? <a href="#" onclick="switchTab('login')">Entrar aqui</a></p>
    </form>

    <!-- FORM LOGIN -->
    <form id="loginForm" style="display: none;">
      <div class="form-group">
        <label for="emailLogin">Email</label>
        <input type="email" id="emailLogin" name="emailLogin" required>
      </div>

      <div class="form-group">
        <label for="senhaLogin">Senha</label>
        <div class="password-toggle">
          <input type="password" id="senhaLogin" name="senhaLogin" required>
          <button type="button" class="toggle-btn" onclick="togglePassword('senhaLogin')">👁️</button>
        </div>
      </div>

      <button type="submit" class="btn-submit">Entrar</button>

      <p class="login-link">Não tem conta? <a href="#" onclick="switchTab('register')">Registrar agora</a></p>
    </form>
  </div>
</div>

<div id="loading" class="loading">
  <div class="spinner"></div>
</div>

<script>
  // ===== FIREBASE CONFIG =====
  const firebaseConfig = {
  apiKey: "AIzaSyD0Ns3F4ZS-qfWD5xAWzwR1tIpDMsRAR54",
  authDomain: "mercadohub-saas.firebaseapp.com",
  databaseURL: "https://mercadohub-saas-default-rtdb.firebaseio.com",
  projectId: "mercadohub-saas",
  storageBucket: "mercadohub-saas.firebasestorage.app",
  messagingSenderId: "929142456645",
  appId: "1:929142456645:web:4e1c079baaa6f75d13be2c"
};

  // Inicializa Firebase
  const app = firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // ===== UTILITY FUNCTIONS =====
  function switchTab(tab) {
    document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');

    clearAlert();
  }

  function togglePassword(fieldId) {
    const field = document.getElementById(fieldId);
    field.type = field.type === 'password' ? 'text' : 'password';
  }

  function showAlert(message, type) {
    const alert = document.getElementById('alert');
    alert.textContent = message;
    alert.className = `alert show ${type}`;
    setTimeout(() => alert.classList.remove('show'), 5000);
  }

  function clearAlert() {
    document.getElementById('alert').classList.remove('show');
  }

  function showLoading(show) {
    document.getElementById('loading').classList.toggle('show', show);
  }

  // ===== REGISTRO =====
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const nome = document.getElementById('nome').value;
    const email = document.getElementById('email').value;
    const senha = document.getElementById('senha').value;
    const nomeLoja = document.getElementById('nomeLojaRegister').value;
    const plano = document.querySelector('input[name="plano"]:checked').value;

    if (!nome || !email || !senha || !nomeLoja) {
      showAlert('Preencha todos os campos', 'error');
      return;
    }

    showLoading(true);

    try {
      // Criar usuário
      const userCredential = await auth.createUserWithEmailAndPassword(email, senha);
      const user = userCredential.user;

      // Salvar dados no Firestore
      await db.collection('users').doc(user.uid).set({
        uid: user.uid,
        nome: nome,
        email: email,
        plano: plano,
        dataRegistro: new Date(),
        dataExpiracao: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000), // 7 dias
        status: 'ativo'
      });

      // Criar loja padrão
      const lojaRef = await db.collection('lojas').add({
        uid_owner: user.uid,
        nome: nomeLoja,
        slug: nomeLoja.toLowerCase().replace(/\s/g, '-'),
        logo: null,
        descricao: '',
        produtosCount: 0,
        status: 'ativo',
        dataCriacao: new Date(),
        plano: plano
      });

      // Atualizar lojas do usuário
      await db.collection('users').doc(user.uid).update({
        lojas: [lojaRef.id]
      });

      showLoading(false);
      showAlert('✅ Conta criada! Redirecionando...', 'success');
      
      setTimeout(() => {
        window.location.href = `/dashboard.html?loja=${lojaRef.id}`;
      }, 2000);

    } catch (error) {
      showLoading(false);
      let msg = 'Erro ao criar conta';
      
      if (error.code === 'auth/email-already-in-use') {
        msg = 'Este email já está registrado';
      } else if (error.code === 'auth/weak-password') {
        msg = 'Senha muito fraca (mín. 6 caracteres)';
      }
      
      showAlert(msg, 'error');
      console.error(error);
    }
  });

  // ===== LOGIN =====
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('emailLogin').value;
    const senha = document.getElementById('senhaLogin').value;

    if (!email || !senha) {
      showAlert('Preencha email e senha', 'error');
      return;
    }

    showLoading(true);

    try {
      await auth.signInWithEmailAndPassword(email, senha);
      
      // Buscar usuário no Firestore
      const user = auth.currentUser;
      const userDoc = await db.collection('users').doc(user.uid).get();
      
      if (userDoc.exists) {
        const userData = userDoc.data();
        const lojaId = userData.lojas && userData.lojas[0];
        
        showLoading(false);
        showAlert('✅ Bem-vindo! Redirecionando...', 'success');
        
        setTimeout(() => {
          window.location.href = `/dashboard.html?loja=${lojaId}`;
        }, 2000);
      }

    } catch (error) {
      showLoading(false);
      let msg = 'Erro ao fazer login';
      
      if (error.code === 'auth/user-not-found') {
        msg = 'Email não encontrado';
      } else if (error.code === 'auth/wrong-password') {
        msg = 'Senha incorreta';
      }
      
      showAlert(msg, 'error');
      console.error(error);
    }
  });

  // ===== CHECK AUTENTICAÇÃO =====
  auth.onAuthStateChanged((user) => {
    if (user) {
      // Usuário já logado, redirecionar
      window.location.href = '/dashboard.html';
    }
  });
</script>

</body>
</html>
