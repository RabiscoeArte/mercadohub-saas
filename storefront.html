<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Loja online - Compre agora!">
  <title>Loja Online</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<!-- ✅ FIREBASE SDK - VERSÃO COMPAT (CORRIGIDA) -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f8f9fa;
      color: #333;
    }

    /* HEADER */
    header {
      background: white;
      padding: 1rem 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: 'Poppins', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #ff6b35;
    }

    .logo img {
      height: 40px;
      margin-right: 10px;
      vertical-align: middle;
    }

    .cart-btn {
      position: relative;
      background: #ff6b35;
      color: white;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }

    .cart-btn:hover {
      background: #d84315;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255,107,53,0.3);
    }

    .badge {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #e91e63;
      color: white;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
    }

    /* HERO */
    .hero {
      background: linear-gradient(135deg, #ff6b35, #d84315);
      color: white;
      padding: 3rem 2rem;
      text-align: center;
    }

    .hero h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: 1.1rem;
      opacity: 0.9;
      margin-bottom: 2rem;
    }

    /* MAIN */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .search-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      justify-content: center;
    }

    .search-bar input, .search-bar select {
      padding: 0.8rem;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
    }

    .search-bar input {
      flex: 1;
      max-width: 300px;
    }

    .search-bar select {
      width: 150px;
    }

    /* GRID PRODUTOS */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .product-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: all 0.3s;
      cursor: pointer;
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }

    .product-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #f0f0f0;
    }

    .product-info {
      padding: 1rem;
    }

    .product-name {
      font-weight: 600;
      margin-bottom: 0.5rem;
      min-height: 2.2em;
    }

    .product-desc {
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 0.8rem;
      min-height: 2.2em;
    }

    .product-price {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.8rem;
    }

    .price {
      font-size: 1.3rem;
      font-weight: 700;
      color: #ff6b35;
    }

    .price-old {
      font-size: 0.9rem;
      color: #999;
      text-decoration: line-through;
    }

    .discount-badge {
      background: #e53935;
      color: white;
      padding: 0.3rem 0.6rem;
      border-radius: 4px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .add-btn {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, #ff6b35, #d84315);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .add-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255,107,53,0.3);
    }

    .add-btn:active {
      transform: scale(0.98);
    }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 2rem;
      color: #666;
    }

    .skeleton {
      background: linear-gradient(90deg, #eee, #ddd, #eee);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 8px;
    }

    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* EMPTY */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #999;
    }

    .empty-state h2 {
      color: #666;
      margin-bottom: 1rem;
    }

    /* MODAL CARRINHO */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: white;
      padding: 2rem;
      border-radius: 15px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        transform: translateY(50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      border-bottom: 2px solid #f0f0f0;
      padding-bottom: 1rem;
    }

    .modal-header h2 {
      font-family: 'Poppins', sans-serif;
      margin: 0;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #999;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .cart-item-info {
      flex: 1;
    }

    .cart-item-name {
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .cart-item-price {
      color: #ff6b35;
      font-weight: 600;
    }

    .qty-control {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .qty-btn {
      width: 28px;
      height: 28px;
      border: 1px solid #ddd;
      background: white;
      cursor: pointer;
      border-radius: 4px;
      font-weight: 600;
      transition: all 0.2s;
    }

    .qty-btn:hover {
      background: #ff6b35;
      color: white;
      border-color: #ff6b35;
    }

    .cart-summary {
      margin-top: 2rem;
      padding: 1.5rem;
      background: #f8f9fa;
      border-radius: 8px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.8rem;
      font-size: 0.95rem;
    }

    .summary-total {
      font-size: 1.3rem;
      font-weight: 700;
      color: #ff6b35;
      border-top: 2px solid #e0e0e0;
      padding-top: 1rem;
    }

    .checkout-form {
      margin-top: 1.5rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
    }

    .checkout-btn {
      width: 100%;
      padding: 1rem;
      background: #25d366;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .checkout-btn:hover {
      background: #1ea853;
      transform: translateY(-2px);
    }

    .checkout-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    @media (max-width: 768px) {
      .hero h1 {
        font-size: 1.8rem;
      }

      .products-grid {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }

      .search-bar {
        flex-direction: column;
      }

      .search-bar input, .search-bar select {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-content">
    <div class="logo">
      <span id="logoName">🛍️ Loja</span>
    </div>
    <button class="cart-btn" onclick="toggleCart()">
      🛒 Carrinho
      <span class="badge" id="cartBadge" style="display:none;">0</span>
    </button>
  </div>
</header>

<!-- HERO -->
<div class="hero">
  <h1 id="storeTitle">Bem-vindo à nossa loja!</h1>
  <p id="storeDesc">Produtos de qualidade com os melhores preços</p>
</div>

<!-- MAIN -->
<div class="container">
  <!-- SEARCH -->
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Buscar produtos..." onkeyup="filterProducts()">
    <select id="categoryFilter" onchange="filterProducts()">
      <option value="">Todas categorias</option>
    </select>
  </div>

  <!-- PRODUTOS -->
  <div id="productsContainer" class="products-grid">
    <div class="skeleton" style="height: 300px;"></div>
    <div class="skeleton" style="height: 300px;"></div>
    <div class="skeleton" style="height: 300px;"></div>
    <div class="skeleton" style="height: 300px;"></div>
  </div>
</div>

<!-- MODAL CARRINHO -->
<div id="cartModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Seu Carrinho</h2>
      <button class="close-btn" onclick="toggleCart()">✕</button>
    </div>

    <div id="cartItems"></div>

    <div class="cart-summary">
      <div class="summary-row">
        <span>Subtotal:</span>
        <span>R$ <span id="subtotal">0.00</span></span>
      </div>
      <div class="summary-row summary-total">
        <span>Total:</span>
        <span>R$ <span id="total">0.00</span></span>
      </div>
    </div>

    <form class="checkout-form" id="checkoutForm">
      <div class="form-group">
        <label for="customerName">Seu Nome</label>
        <input type="text" id="customerName" required>
      </div>

      <div class="form-group">
        <label for="customerEmail">Email</label>
        <input type="email" id="customerEmail" required>
      </div>

      <div class="form-group">
        <label for="customerPhone">WhatsApp</label>
        <input type="tel" id="customerPhone" placeholder="(85) 99999-9999" required>
      </div>

      <div class="form-group">
        <label for="customerAddress">Endereço</label>
        <input type="text" id="customerAddress" placeholder="Rua, número" required>
      </div>

      <div class="form-group">
        <label for="paymentMethod">Forma de Pagamento</label>
        <select id="paymentMethod" required>
          <option>PIX</option>
          <option>Dinheiro na entrega</option>
          <option>Cartão</option>
        </select>
      </div>

      <button type="submit" class="checkout-btn">📲 Finalizar Pedido no WhatsApp</button>
    </form>
  </div>
</div>

<script>
  // ===== FIREBASE CONFIG =====
  const firebaseConfig = {
  apiKey: "AIzaSyDaZWj9ApORih26Pb4x-46ilrtxEXxQfm0",
  authDomain: "mercado-hub-90a82.firebaseapp.com",
  projectId: "mercado-hub-90a82",
  storageBucket: "mercado-hub-90a82.firebasestorage.app",
  messagingSenderId: "872416491456",
  appId: "1:872416491456:web:29c37a42cfeeb40a087a25"
};

  const app = firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let produtos = [];
  let carrinho = [];
  let lojaId = null;
  let storeData = null;
  
  // ===== INIT =====
  async function init() {
  console.log('🚀 Iniciando storefront');
  console.log('📍 URL:', window.location.href);
  console.log('📍 Pathname:', window.location.pathname);
  console.log('📍 Search:', window.location.search);
  
  // Pegar loja_id da URL
  const params = new URLSearchParams(window.location.search);
  lojaId = params.get('loja') || params.get('lojaId') || localStorage.getItem('lojaId');
  
  console.log('1️⃣ lojaId do params:', lojaId);

  // Também aceita /loja/abc123 no path
  if (!lojaId) {
    const path = window.location.pathname;
    console.log('2️⃣ Tentando extrair do path:', path);
    
    // ✅ REGEX CORRIGIDO - aceita qualquer coisa
    // ✅ NOVO (tenta slug PRIMEIRO, depois ID):
const matches = path.match(/\/loja\/([^/]+)/);
if (matches) {
  const slugOuId = matches[1];
  
  console.log('🔍 Procurando loja com slug:', slugOuId);
  
  // Primeiro tenta buscar por SLUG
  const slugQuery = await db.collection('lojas')
    .where('slug', '==', slugOuId)
    .get();
  
  if (!slugQuery.empty) {
    // Encontrou por slug
    lojaId = slugQuery.docs[0].id;
    console.log('✅ Loja encontrada por slug, ID:', lojaId);
  } else {
    // Se não encontrou por slug, tenta por ID
    lojaId = slugOuId;
    console.log('ℹ️ Slug não encontrado, tentando como ID:', lojaId);
  }
}
  }

  console.log('4️⃣ lojaId final:', lojaId);

  if (!lojaId) {
    console.error('❌ Nenhum lojaId encontrado!');
    document.getElementById('productsContainer').innerHTML = `
      <div class="empty-state">
        <h2>Loja não encontrada</h2>
        <p>Nenhuma loja disponível neste link</p>
      </div>
    `;
    return;
  }

  // Carregar dados da loja
  try {
    console.log('5️⃣ Buscando dados da loja:', lojaId);
    
    const lojaDoc = await db.collection('lojas').doc(lojaId).get();
    
    if (!lojaDoc.exists) {
      console.error('❌ Loja não existe no Firestore:', lojaId);
      document.getElementById('productsContainer').innerHTML = `
        <div class="empty-state">
          <h2>Loja não encontrada</h2>
          <p>ID: ${lojaId}</p>
        </div>
      `;
      return;
    }

    storeData = lojaDoc.data();
    console.log('6️⃣ Dados da loja:', storeData);
    
    document.getElementById('storeTitle').textContent = storeData.nome || 'Loja Online';
    document.getElementById('storeDesc').textContent = storeData.descricao || 'Bem-vindo!';
    document.getElementById('logoName').textContent = (storeData.logo ? '🏪' : '🛍️') + ' ' + storeData.nome;
    document.title = storeData.nome;

    // Carregar produtos
    console.log('7️⃣ Buscando produtos com loja_id:', lojaId);
    
    const prodsSnapshot = await db.collection('produtos')
      .where('loja_id', '==', lojaId)
      .get();

    console.log('8️⃣ Total de produtos encontrados:', prodsSnapshot.size);

    produtos = [];
    prodsSnapshot.forEach(doc => {
      const prodData = doc.data();
      console.log('   Produto:', doc.id, prodData);
      produtos.push({ id: doc.id, ...prodData });
    });

    console.log('9️⃣ Array de produtos:', produtos);

    renderProducts(produtos);
    populateCategories();
    
    console.log('✅ Storefront carregado com sucesso!');

  } catch (error) {
    console.error('❌ ERRO ao carregar loja:', error);
    console.error('   Código:', error.code);
    console.error('   Mensagem:', error.message);
  }
}

  function populateCategories() {
    const categories = [...new Set(produtos.map(p => p.categoria))];
    const select = document.getElementById('categoryFilter');
    categories.forEach(cat => {
      const option = document.createElement('option');
      option.value = cat;
      option.textContent = cat;
      select.appendChild(option);
    });
  }

  function renderProducts(list) {
    const container = document.getElementById('productsContainer');
    
    if (list.length === 0) {
      container.innerHTML = `
        <div class="empty-state" style="grid-column: 1 / -1;">
          <h2>Nenhum produto encontrado</h2>
          <p>Tente outra busca ou categoria</p>
        </div>
      `;
      return;
    }

    container.innerHTML = list.map(p => {
  const preco = Number(p.preco) || 0;
  const promo = Number(p.promocao) || 0;
  const desconto = promo > 0 ? Math.round((1 - promo/preco) * 100) : 0;

  return `
    <div class="product-card">
      <div class="img-container">
        ${promo > 0 ? `<span class="discount-badge">-${desconto}%</span>` : ``}
        <img src="${p.imagem || 'https://via.placeholder.com/200'}" class="product-img" onerror="this.src='https://via.placeholder.com/200'">
      </div>

      <div class="product-info">
        <div class="product-name">${p.nome}</div>
        <div class="product-desc">${p.descricao || ''}</div>

        <div class="product-price">
          ${promo > 0 ? `
            <span class="price">R$ ${promo.toFixed(2)}</span>
            <span class="price-old">R$ ${preco.toFixed(2)}</span>
          ` : `
            <span class="price">R$ ${preco.toFixed(2)}</span>
          `}
        </div>

        <button class="add-btn" onclick="addCart('${p.id}', '${p.nome}', ${promo > 0 ? promo : preco})">
          🛒 Adicionar
        </button>
      </div>
    </div>
  `;
}).join('');
  }

  function filterProducts() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const category = document.getElementById('categoryFilter').value;

    const filtered = produtos.filter(p => {
      const matchSearch = p.nome.toLowerCase().includes(search) || 
                         (p.descricao && p.descricao.toLowerCase().includes(search));
      const matchCategory = !category || p.categoria === category;
      return matchSearch && matchCategory;
    });

    renderProducts(filtered);
  }

  function addCart(prodId, nome, preco) {
    const item = carrinho.find(i => i.id === prodId);
    
    if (item) {
      item.qtd++;
    } else {
      carrinho.push({ id: prodId, nome, preco, qtd: 1 });
    }

    updateCartBadge();
  }

  function updateCartBadge() {
    const totalQtd = carrinho.reduce((t, i) => t + i.qtd, 0);
    const badge = document.getElementById('cartBadge');
    
    if (totalQtd > 0) {
      badge.style.display = 'flex';
      badge.textContent = totalQtd;
    } else {
      badge.style.display = 'none';
    }
  }

  function toggleCart() {
    const modal = document.getElementById('cartModal');
    modal.classList.toggle('show');
    
    if (modal.classList.contains('show')) {
      renderCart();
    }
  }

  function renderCart() {
    const container = document.getElementById('cartItems');

    if (carrinho.length === 0) {
      container.innerHTML = '<p style="text-align:center;color:#999;padding:2rem;">Seu carrinho está vazio</p>';
      document.getElementById('checkoutForm').style.display = 'none';
      return;
    }

    document.getElementById('checkoutForm').style.display = 'block';

    container.innerHTML = carrinho.map((item, idx) => `
      <div class="cart-item">
        <div class="cart-item-info">
          <div class="cart-item-name">${item.nome}</div>
          <div class="cart-item-price">R$ ${item.preco.toFixed(2)} x ${item.qtd}</div>
        </div>
        <div class="qty-control">
          <button type="button" class="qty-btn" onclick="changeQty(${idx}, '-')">−</button>
          <span style="width:30px;text-align:center;">${item.qtd}</span>
          <button type="button" class="qty-btn" onclick="changeQty(${idx}, '+')">+</button>
        </div>
      </div>
    `).join('');

    updateCartSummary();
  }

  function changeQty(idx, op) {
    if (op === '+') {
      carrinho[idx].qtd++;
    } else if (op === '-') {
      carrinho[idx].qtd--;
      if (carrinho[idx].qtd <= 0) {
        carrinho.splice(idx, 1);
      }
    }

    updateCartBadge();
    renderCart();
  }

  function updateCartSummary() {
    const subtotal = carrinho.reduce((t, i) => t + (i.preco * i.qtd), 0);
    document.getElementById('subtotal').textContent = subtotal.toFixed(2);
    document.getElementById('total').textContent = subtotal.toFixed(2);
  }

  document.getElementById('checkoutForm').addEventListener('submit', (e) => {
    e.preventDefault();

    const nome = document.getElementById('customerName').value;
    const email = document.getElementById('customerEmail').value;
    const telefone = document.getElementById('customerPhone').value;
    const endereco = document.getElementById('customerAddress').value;
    const pagamento = document.getElementById('paymentMethod').value;

    const total = carrinho.reduce((t, i) => t + (i.preco * i.qtd), 0);

    let msg = `🛒 *NOVO PEDIDO* \n\n`;
    msg += `🛍️ *Pedido*\n`;
    carrinho.forEach(item => {
      msg += `• ${item.nome} x${item.qtd} - R$ ${(item.preco * item.qtd).toFixed(2)}\n`;
    });

    msg += `\n💰 *Total:* R$ ${total.toFixed(2)}`;
    msg += `\n\n👤 *Nome:* ${nome}`;
    msg += `\n📩 *Email:* ${email}`;
    msg += `\n🏡 *Endereço:* ${endereco}`;
    msg += `\n💵 *Pagamento:* ${pagamento}`;

    const numero = storeData.whatsapp || "5585994083703";
    const url = `https://wa.me/${numero}?text=${encodeURIComponent(msg)}`;

    // Salvar pedido no Firestore
    db.collection('pedidos').add({
      loja_id: lojaId,
      cliente: nome,
      email: email,
      telefone: telefone,
      endereco: endereco,
      pagamento: pagamento,
      itens: carrinho.map(i => `${i.nome} x${i.qtd}`).join(', '),
      total: total,
      status: 'novo',
      dataPedido: new Date()
    }).catch(err => console.error('Erro ao salvar:', err));

    window.open(url, '_blank');
    carrinho = [];
    updateCartBadge();
    toggleCart();
  });

  // Fechar modal ao clicar fora
  document.getElementById('cartModal').addEventListener('click', (e) => {
    if (e.target.id === 'cartModal') {
      toggleCart();
    }
  });

  // Iniciar
  init();
</script>

</body>
</html>
