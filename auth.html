<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Registre-se e crie sua loja online">
  <title>MercadoHub - Registrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #ff6b35, #d84315);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 2rem;
      max-width: 450px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo {
      font-family: 'Poppins', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: #ff6b35;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.5rem;
      color: #333;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #666;
      font-size: 0.9rem;
    }

    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 2px solid #f0f0f0;
    }

    .tab-btn {
      flex: 1;
      padding: 1rem;
      background: transparent;
      border: none;
      font-weight: 600;
      color: #999;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }

    .tab-btn.active {
      color: #ff6b35;
      border-bottom-color: #ff6b35;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #333;
      font-size: 0.95rem;
    }

    input, select {
      width: 100%;
      padding: 0.9rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #ff6b35;
      box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
    }

    .password-toggle {
      position: relative;
    }

    .toggle-btn {
      position: absolute;
      right: 12px;
      top: 38px;
      background: none;
      border: none;
      cursor: pointer;
      color: #999;
      font-size: 1.2rem;
    }

    .btn {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: linear-gradient(135deg, #ff6b35, #d84315);
      color: white;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: none;
      font-size: 0.9rem;
    }

    .alert.show {
      display: block;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .alert-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .alert-error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 0.5rem;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .link {
      text-align: center;
      margin-top: 1rem;
      color: #666;
    }

    .link a {
      color: #ff6b35;
      text-decoration: none;
      font-weight: 600;
    }

    .link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 600px) {
      .container {
        padding: 1.5rem;
      }

      h1 {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">🏪 MercadoHub</div>
    <h1>Bem-vindo!</h1>
    <p class="subtitle">Crie sua loja online em 2 minutos</p>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('register')">Registrar</button>
    <button class="tab-btn" onclick="switchTab('login')">Entrar</button>
  </div>

  <!-- REGISTRO -->
  <div id="register" class="tab-content active">
    <div id="registerAlert" class="alert"></div>

    <form onsubmit="handleRegister(event)">
      <div class="form-group">
        <label for="registerName">Seu Nome Completo</label>
        <input type="text" id="registerName" required placeholder="Seu nome">
      </div>

      <div class="form-group">
        <label for="registerEmail">Email</label>
        <input type="email" id="registerEmail" required placeholder="seu@email.com">
      </div>

      <div class="form-group">
        <label for="registerPassword">Senha (mínimo 6 caracteres)</label>
        <div class="password-toggle">
          <input type="password" id="registerPassword" required placeholder="••••••">
          <button type="button" class="toggle-btn" onclick="togglePassword('registerPassword')">👁️</button>
        </div>
      </div>

      <div class="form-group">
        <label for="registerStoreName">Nome da Sua Loja</label>
        <input type="text" id="registerStoreName" required placeholder="Ex: Minha Loja">
      </div>

      <div class="form-group">
        <label for="registerPlan">Escolha seu Plano</label>
        <select id="registerPlan" required>
          <option value="starter">🌱 Starter - R$ 99/mês (1 loja, 100 produtos)</option>
          <option value="pro" selected>⭐ Pro - R$ 199/mês (3 lojas, 500 produtos)</option>
          <option value="premium">💎 Premium - R$ 499/mês (Ilimitado)</option>
        </select>
      </div>

      <div class="form-group">
        <label>
          <input type="checkbox" required>
          Concordo com os Termos de Serviço
        </label>
      </div>

      <button type="submit" class="btn btn-primary" id="registerBtn">
        Criar Minha Conta
      </button>
    </form>

    <div class="link">
      Já tem conta? <a href="javascript:switchTab('login')">Entrar aqui</a>
    </div>
  </div>

  <!-- LOGIN -->
  <div id="login" class="tab-content">
    <div id="loginAlert" class="alert"></div>

    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" required placeholder="seu@email.com">
      </div>

      <div class="form-group">
        <label for="loginPassword">Senha</label>
        <div class="password-toggle">
          <input type="password" id="loginPassword" required placeholder="••••••">
          <button type="button" class="toggle-btn" onclick="togglePassword('loginPassword')">👁️</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" id="loginBtn">
        Entrar na Minha Conta
      </button>
    </form>

    <div class="link">
      Não tem conta? <a href="javascript:switchTab('register')">Registrar aqui</a>
    </div>
  </div>
</div>

<!-- ✅ FIREBASE SDK - VERSÃO COMPAT (CORRIGIDA) -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
  // ===== FIREBASE CONFIG =====
  const firebaseConfig = {
    apiKey: "AIzaSyD0Ns3F4ZS-qfWD5xAWzwR1tIpDMsRAR54",
    authDomain: "mercadohub-saas.firebaseapp.com",
    projectId: "mercadohub-saas",
    storageBucket: "mercadohub-saas.firebasestorage.app",
    messagingSenderId: "929142456645",
    appId: "1:329142456645:web:4e1c079baaa6f75d13be2c"
  };

  // Inicializar Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  console.log("✅ Firebase inicializado!");

  // ===== FUNÇÕES =====

  function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    
    document.getElementById(tab).classList.add('active');
    event.target.classList.add('active');

    document.getElementById('registerAlert').classList.remove('show');
    document.getElementById('loginAlert').classList.remove('show');
  }

  function togglePassword(inputId) {
    const input = document.getElementById(inputId);
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  function showAlert(alertId, message, type) {
    const alert = document.getElementById(alertId);
    alert.textContent = message;
    alert.className = `alert show alert-${type}`;
    setTimeout(() => alert.classList.remove('show'), 5000);
  }

  async function handleRegister(e) {
    e.preventDefault();

    const name = document.getElementById('registerName').value.trim();
    const email = document.getElementById('registerEmail').value.trim();
    const password = document.getElementById('registerPassword').value;
    const storeName = document.getElementById('registerStoreName').value.trim();
    const plan = document.getElementById('registerPlan').value;
    const btn = document.getElementById('registerBtn');

    if (!name || !email || !password || !storeName) {
      showAlert('registerAlert', '❌ Preencha todos os campos', 'error');
      return;
    }

    if (password.length < 6) {
      showAlert('registerAlert', '❌ Senha deve ter no mínimo 6 caracteres', 'error');
      return;
    }

    btn.disabled = true;
    const originalText = btn.textContent;
    btn.innerHTML = '<span class="spinner"></span>Criando conta...';

    try {
      const userCredential = await auth.createUserWithEmailAndPassword(email, password);
      const user = userCredential.user;
      console.log("✅ Usuário criado:", user.uid);

      await db.collection('users').doc(user.uid).set({
        uid: user.uid,
        nome: name,
        email: email,
        plano: plan,
        lojas: [],
        status: 'ativo',
        dataRegistro: new Date(),
        dataExpiração: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000)
      });
      console.log("✅ Documento de usuário criado");

      const lojaRef = await db.collection('lojas').add({
        uid_owner: user.uid,
        nome: storeName,
        slug: storeName.toLowerCase().replace(/\s+/g, '-'),
        status: 'ativo',
        produtosCount: 0,
        plano: plan,
        dataCriacao: new Date()
      });
      console.log("✅ Loja criada:", lojaRef.id);

      await db.collection('users').doc(user.uid).update({
        lojas: firebase.firestore.FieldValue.arrayUnion(lojaRef.id)
      });
      console.log("✅ Registro completo!");

      showAlert('registerAlert', '✅ Conta criada com sucesso! Redirecionando...', 'success');
      btn.textContent = originalText;
      
      setTimeout(() => {
        window.location.href = `/dashboard.html?loja=${lojaRef.id}`;
      }, 1500);

    } catch (error) {
      console.error("❌ Erro:", error.code, error.message);
      
      let mensagem = error.message;
      
      if (error.code === 'auth/email-already-in-use') {
        mensagem = 'Email já registrado. Tente outro ou faça login.';
      } else if (error.code === 'auth/weak-password') {
        mensagem = 'Senha muito fraca. Use no mínimo 6 caracteres.';
      } else if (error.code === 'auth/invalid-email') {
        mensagem = 'Email inválido.';
      } else if (error.code === 'auth/operation-not-allowed') {
        mensagem = 'Registro não permitido. Contate o suporte.';
      } else if (error.code === 'permission-denied') {
        mensagem = 'Erro de permissão. Verifique as regras do Firestore.';
      }
      
      showAlert('registerAlert', `❌ ${mensagem}`, 'error');
      btn.disabled = false;
      btn.textContent = originalText;
    }
  }

  async function handleLogin(e) {
    e.preventDefault();

    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');

    if (!email || !password) {
      showAlert('loginAlert', '❌ Preencha todos os campos', 'error');
      return;
    }

    btn.disabled = true;
    const originalText = btn.textContent;
    btn.innerHTML = '<span class="spinner"></span>Entrando...';

    try {
      const userCredential = await auth.signInWithEmailAndPassword(email, password);
      console.log("✅ Autenticação bem-sucedida:", userCredential.user.uid);

      // 🔧 CORREÇÃO: Aguardar Firestore conectar
      await new Promise(resolve => setTimeout(resolve, 2000));
      console.log("✅ Aguardou 2 segundos para Firestore");

      // Buscar dados do usuário
      try {
        const userDoc = await db.collection('users').doc(userCredential.user.uid).get();
        
        if (userDoc.exists) {
          const userData = userDoc.data();
          const lojas = userData.lojas || [];
          
          if (lojas.length > 0) {
            console.log("✅ Lojas encontradas:", lojas);
            showAlert('loginAlert', '✅ Login realizado! Redirecionando...', 'success');
            
            setTimeout(() => {
              window.location.href = `/dashboard.html?loja=${lojas[0]}`;
            }, 1500);
          } else {
            throw new Error('Nenhuma loja associada a este usuário');
          }
        } else {
          console.error("⚠️ Documento de usuário não encontrado");
          throw new Error('Usuário não encontrado no banco de dados');
        }
      } catch (firestoreError) {
        console.error("❌ Erro Firestore:", firestoreError.message);
        throw firestoreError;
      }

    } catch (error) {
      console.error("❌ Erro de login:", error.code, error.message);
      
      let mensagem = error.message;
      
      if (error.code === 'auth/user-not-found') {
        mensagem = 'Usuário não encontrado. Verifique o email.';
      } else if (error.code === 'auth/wrong-password') {
        mensagem = 'Senha incorreta.';
      } else if (error.code === 'auth/too-many-login-attempts') {
        mensagem = 'Muitas tentativas. Aguarde 15 minutos.';
      } else if (error.code === 'auth/invalid-email') {
        mensagem = 'Email inválido.';
      } else if (error.message && error.message.includes('offline')) {
        mensagem = 'Firestore não conseguiu conectar. Tente novamente.';
      }
      
      showAlert('loginAlert', `❌ ${mensagem}`, 'error');
      btn.disabled = false;
      btn.textContent = originalText;
    }
  }

  auth.onAuthStateChanged(user => {
    if (user) {
      console.log("✅ Usuário já logado:", user.email);
    }
  });

  console.log("✅ Auth.html carregado!");
</script>

</body>
</html>
